<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkForge — Login</title>
  <meta name="description" content="Log in to your LinkForge account to manage and track your shortened links.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-body">
  <div class="auth-layout">

    <!-- Left: Branding -->
    <div class="auth-visual">
      <a href="index.html" class="auth-visual__brand"><span>LF</span> LinkForge</a>
      <div class="auth-visual__content">
        <h2>Shorten.<br><em>Track.</em><br>Own it.</h2>
        <p>Every link tells a story. Log in to see yours.</p>
      </div>
      <div class="auth-visual__stats">
        <div class="stat">
          <span class="stat__number">∞</span>
          <span class="stat__label">Links</span>
        </div>
        <div class="stat">
          <span class="stat__number">24/7</span>
          <span class="stat__label">Uptime</span>
        </div>
        <div class="stat">
          <span class="stat__number">0ms</span>
          <span class="stat__label">Redirect</span>
        </div>
      </div>
    </div>

    <!-- Right: Form -->
    <div class="auth-form-panel">
      <div class="auth-form-panel__inner">
        <h1>Welcome back</h1>
        <p class="auth-subtitle">Enter your credentials to continue</p>

        <form id="form-login" onsubmit="handleLogin(event)">
          <div class="auth-field">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="you@example.com" required>
          </div>
          <div class="auth-field">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="auth-btn">Login →</button>
        </form>

        <p class="auth-footer">
          Don't have an account? <a href="register.html">Create one</a>
        </p>
      </div>
    </div>

  </div>
  <div class="toast-box" id="toasts"></div>
  <script src="app.js"></script>
</body>
</html>
