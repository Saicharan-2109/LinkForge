<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkForge — Register</title>
  <meta name="description" content="Create your LinkForge account to start forging, shortening, and tracking your links.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-body">
  <div class="auth-layout">

    <!-- Left: Branding -->
    <div class="auth-visual">
      <a href="index.html" class="auth-visual__brand"><span>LF</span> LinkForge</a>
      <div class="auth-visual__content">
        <h2>Start<br><em>Forging</em><br>Today.</h2>
        <p>Create an account and turn long URLs into powerful short links.</p>
      </div>
      <div class="auth-visual__stats">
        <div class="stat">
          <span class="stat__number">Free</span>
          <span class="stat__label">Forever</span>
        </div>
        <div class="stat">
          <span class="stat__number">1-click</span>
          <span class="stat__label">Setup</span>
        </div>
        <div class="stat">
          <span class="stat__number">100%</span>
          <span class="stat__label">Yours</span>
        </div>
      </div>
    </div>

    <!-- Right: Form -->
    <div class="auth-form-panel">
      <div class="auth-form-panel__inner">
        <h1>Create account</h1>
        <p class="auth-subtitle">Join the forge — it only takes a minute</p>

        <form id="form-register" onsubmit="handleRegister(event)">
          <div class="auth-field">
            <label for="reg-name">Name</label>
            <input type="text" id="reg-name" placeholder="Your name" required>
          </div>
          <div class="auth-field">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="you@example.com" required>
          </div>
          <div class="auth-field">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" placeholder="Min 6 characters" minlength="6" required>
          </div>
          <button type="submit" class="auth-btn">Create Account →</button>
        </form>

        <p class="auth-footer">
          Already have an account? <a href="login.html">Login</a>
        </p>
      </div>
    </div>

  </div>
  <div class="toast-box" id="toasts"></div>
  <script src="app.js"></script>
</body>
</html>
